name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # ----- Backend -----
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install backend dependencies
        run: |
          cd backend
          pip install uv
          uv sync --frozen --dev

      - name: Create .env for backend tests
        run: |
          # Если есть .env.example в корне родительского репозитория
          if [ -f .env.example ]; then
            cp .env.example backend/.env
          else
            # Минимальный .env для тестов
            cat > backend/.env << 'EOF'
            DB_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/testdb
            ACCESS_TOKEN_EXPIRE_MINUTES=30
            REFRESH_TOKEN_EXPIRE_MINUTES=1440
            SECRET_KEY=testsecretkey
            ALGORITHM=HS256
            EOF
          fi

      - name: Lint backend (ruff)
        run: |
          cd backend
          uv run ruff check .

      - name: Run backend tests (pytest)
        run: |
          cd backend
          uv run pytest

      # ----- Frontend -----
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint frontend (eslint)
        run: |
          cd frontend
          npm run lint

      - name: Run frontend unit tests
        run: |
          cd frontend
          npm run test

      - name: Run frontend e2e tests
        run: |
          cd frontend
          npm run test:e2e

      - name: Build frontend (production)
        run: |
          cd frontend
          npm run build

  build-and-push:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/financetrack-backend:latest

      - name: Build and push nginx (frontend+proxy)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.nginx
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/financetrack-nginx:latest